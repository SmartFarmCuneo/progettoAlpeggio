services:

  # ------------------------------
  # Flask app
  # ------------------------------
  flask-app:
    build: ./SitoAlpeggio
    container_name: flask-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mysql
      - postgres
    networks:
      - backend

  # ------------------------------
  # Stripe CLI (dev only)
  # ------------------------------
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: stripe-cli
    restart: unless-stopped
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_DEVICE_NAME=docker_alpeggio
    depends_on:
      - flask-app
    command: listen --forward-to http://flask-app:5000/webhook --skip-verify --log-level debug
    networks:
      - backend

  # ------------------------------
  # PHP-FPM
  # ------------------------------
  php-fpm:
    image: php:8.2-fpm
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
    ports:
      - "9000:9000"
    networks:
      - backend

  # ------------------------------
  # Nginx
  # ------------------------------
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - backend

  # ------------------------------
  # MySQL (solo per compatibilità legacy)
  # ------------------------------
  mysql:
    image: mysql:latest
    container_name: mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    depends_on:
      - mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:80"
    networks:
      - backend

  # ------------------------------
  # PostgreSQL (DB principale)
  # ------------------------------
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PG_DB_NAME}
      POSTGRES_USER: ${PG_DB_USER}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    # In produzione, valutare di rimuovere questa porta o limitarla a VPN/rete interna
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8082:80"
    networks:
      - backend

# ------------------------------
# Network isolata
# ------------------------------
networks:
  backend:
    driver: bridge
